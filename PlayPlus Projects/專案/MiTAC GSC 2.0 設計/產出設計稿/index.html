<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTAC GSC 2.0 Prototype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004994',
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Setup basic transitions and custom scrollbar if needed */
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .hide {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px) scale(0.95);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .tab-btn.active {
            color: #004994 !important;
            border-left-color: #004994 !important;
            background-color: #f0f9ff !important;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Top Bar Header -->
    <header
        class="flex justify-between items-center h-20 px-8 bg-[#004994] shrink-0 border-b border-white/10 shadow-lg z-10 w-full">
        <div class="flex items-center gap-3 cursor-pointer group select-none">
            <!-- MiTAC Logo part -->
            <div class="flex items-center">
                <img src="mitac_logo.png" alt="MiTAC Logo" class="h-8 w-auto">
            </div>
            <!-- App Title part -->
            <span class="text-[28px] font-medium text-white tracking-wider ml-1">
                GSC
            </span>
        </div>

        <div class="flex items-center space-x-8">
            <!-- Language Switcher -->
            <div class="relative">
                <button id="langToggle"
                    class="flex items-center space-x-2 text-sm font-medium text-white/80 hover:text-white transition-colors py-2">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span class="hidden md:inline" id="currentLang">繁體中文</span>
                </button>
                <div id="langDropdown"
                    class="hide absolute top-full right-0 mt-2 w-40 bg-white border border-slate-200 rounded-lg shadow-xl py-2 z-50 fade-in">
                    <button
                        class="lang-option block w-full text-left px-4 py-2.5 text-sm transition-colors text-slate-600 hover:bg-slate-50"
                        data-lang="繁體中文">繁體中文</button>
                    <button
                        class="lang-option block w-full text-left px-4 py-2.5 text-sm transition-colors text-slate-600 hover:bg-slate-50"
                        data-lang="简体中文">简体中文</button>
                    <button
                        class="lang-option block w-full text-left px-4 py-2.5 text-sm transition-colors text-slate-600 hover:bg-slate-50"
                        data-lang="English">English</button>
                    <button
                        class="lang-option block w-full text-left px-4 py-2.5 text-sm transition-colors text-slate-600 hover:bg-slate-50"
                        data-lang="Tiếng Việt">Tiếng Việt</button>
                </div>
            </div>

            <div class="flex items-center space-x-5">
                <button class="text-white/70 hover:text-white relative transition-colors group">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span
                        class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-[#004994]"></span>
                </button>
                <div class="h-6 w-px bg-white/20"></div>
                <div class="flex items-center space-x-3 pl-2 group cursor-pointer">
                    <div
                        class="w-9 h-9 rounded-full bg-white/10 border border-white/20 overflow-hidden flex items-center justify-center transition-colors group-hover:border-white/40">
                        <span class="text-white font-bold text-sm">SC</span>
                    </div>
                    <div class="hidden lg:flex flex-col text-left">
                        <span class="text-sm font-bold text-white leading-none">STAR.Chang</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-[#E2E9ED] flex flex-col shrink-0">
            <div
                class="px-6 py-5 border-b border-[#E2E9ED] flex items-center gap-2 text-slate-400 cursor-pointer hover:bg-slate-50 transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                <span class="text-sm font-bold text-slate-600">功能管理</span>
            </div>
            <nav class="flex-1 py-4">
                <button
                    class="tab-btn active w-full flex items-center px-6 py-3.5 text-sm font-bold transition-all border-l-[4px] border-transparent text-slate-500 hover:bg-slate-50"
                    data-tab="pending">
                    <span class="flex-1 text-left">待簽核</span>
                </button>
                <button
                    class="tab-btn w-full flex items-center px-6 py-3.5 text-sm font-bold transition-all border-l-[4px] border-transparent text-slate-500 hover:bg-slate-50"
                    data-tab="history">
                    <span class="flex-1 text-left">歷史單據</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-hidden flex flex-col bg-slate-50">
            <!-- Sub-Header / Page Title Bar -->
            <div class="bg-white border-b border-[#E2E9ED] px-8 py-6 shrink-0">
                <div class="max-w-7xl mx-auto">
                    <h1 id="pageTitle" class="text-2xl font-bold text-slate-900">待簽核</h1>
                </div>
            </div>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-auto p-4 sm:p-6 lg:p-8">
                <div class="max-w-7xl mx-auto space-y-6">
                    <!-- Widgets -->
                    <div class="flex flex-wrap gap-x-12 gap-y-4 px-1">
                    <div class="flex flex-col w-fit">
                        <span class="text-slate-500 text-sm font-medium">數量統計</span>
                        <div class="mt-2 flex items-baseline space-x-3">
                            <span class="text-3xl font-bold text-slate-900">42</span>
                            <div class="flex items-center gap-2">
                                <span
                                    class="text-xs text-slate-600 bg-slate-100 px-2 py-0.5 rounded-full border border-slate-200 font-medium">
                                    今日 +3
                                </span>
                                <span
                                    class="text-xs text-red-600 bg-red-50 px-2 py-0.5 rounded-full border border-red-100 font-bold">
                                    即將逾期 2
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filters Bar -->
                <div
                    class="bg-white p-3 rounded-lg border border-slate-200 flex flex-col md:flex-row md:items-center gap-3 w-fit">
                    <div class="relative w-full md:w-[45%] min-w-[300px]">
                        <i data-lucide="search"
                            class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 z-10"></i>
                        <input type="text" placeholder="搜尋單號、標題..."
                            class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 focus:bg-white transition-colors h-[40px]">
                    </div>
                    <div class="flex flex-wrap items-center gap-3 flex-1">
                        <div class="relative w-48" id="companySelectContainer">
                            <button id="companySelectTrigger" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-sm text-slate-700 h-[40px] flex justify-between items-center focus:outline-none focus:ring-2 focus:ring-slate-400 transition-colors hover:bg-slate-100 group relative pr-8">
                                <span id="companySelectLabel" class="truncate font-medium">所有公司</span>
                                <div class="absolute right-2 flex items-center gap-1.5">
                                    <div id="companyClearX" class="hide p-0.5 hover:bg-slate-200 rounded-full transition-colors text-slate-400 hover:text-slate-600" title="清除全部">
                                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                                    </div>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 shrink-0"></i>
                                </div>
                            </button>
                            
                            <div id="companySelectDropdown" class="hide absolute left-0 top-full mt-1 w-64 bg-white border border-slate-200 rounded-lg shadow-xl z-50 flex flex-col fade-in">
                                <div class="p-2 border-b border-slate-100">
                                    <div class="relative">
                                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                        <input type="text" id="companySelectSearch" placeholder="搜尋公司..." class="w-full pl-9 pr-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-[#004994] focus:border-transparent transition-shadow">
                                    </div>
                                </div>
                                <div class="overflow-y-auto max-h-56 p-1 relative" id="companySelectList">
                                    <!-- Rendered via JS -->
                                </div>
                                <div class="p-2 border-t border-slate-100 bg-slate-50/50">
                                    <button id="companyClearAll" class="w-full py-2 text-xs font-bold text-slate-500 hover:text-red-600 hover:bg-red-50 rounded transition-colors flex items-center justify-center gap-1.5">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                        清除全部
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button onclick="openFilterModal()"
                            class="flex items-center space-x-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-md text-sm text-slate-700 hover:bg-slate-100 h-[40px] whitespace-nowrap shrink-0 min-w-[120px] justify-center transition-colors">
                            <i data-lucide="filter" class="w-4 h-4 text-slate-500 border-none outline-none"></i>
                            <span>更多篩選</span>
                        </button>
                    </div>
                </div>

                <!-- Task List -->
                <div class="space-y-3" id="taskList">
                    <!-- Rendered through JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Advanced Filter Modal -->
    <div id="filterModalOverlay" class="hide fixed inset-0 z-[70] bg-slate-900/60 flex items-center justify-center p-4 sm:p-6 backdrop-blur-sm fade-in">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl flex flex-col overflow-hidden slide-up relative">
            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="filter" class="w-5 h-5 text-slate-500"></i>
                    更多篩選條件
                </h2>
                <button onclick="closeFilterModal()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Body -->
            <div class="p-6 space-y-6 overflow-y-auto max-h-[70vh]">
                <!-- Status -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">簽核狀態</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-md cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" class="w-4 h-4 text-[#004994] rounded border-slate-300 focus:ring-[#004994]">
                            <span class="text-sm text-slate-700 font-medium">待簽核</span>
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-md cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" class="w-4 h-4 text-[#004994] rounded border-slate-300 focus:ring-[#004994]">
                            <span class="text-sm text-slate-700 font-medium">正在聯繫</span>
                        </label>
                    </div>
                </div>
                
                <!-- Tags -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">標籤</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-md cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" class="w-4 h-4 text-[#004994] rounded border-slate-300 focus:ring-[#004994]">
                            <span class="text-sm text-slate-700 font-medium">代理</span>
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-md cursor-pointer hover:bg-slate-50 transition-colors">
                            <input type="checkbox" class="w-4 h-4 text-[#004994] rounded border-slate-300 focus:ring-[#004994]">
                            <span class="text-sm text-slate-700 font-medium">即將逾期</span>
                        </label>
                    </div>
                </div>

                <!-- Submitter Name -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">提交者名稱</label>
                    <input type="text" placeholder="請輸入姓名..." class="w-full px-3 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#004994] focus:border-[#004994] transition-shadow">
                </div>

                <!-- Submitter Dept -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">提交者部門</label>
                    <div class="relative w-full" id="deptSelectContainer">
                        <button id="deptSelectTrigger" class="w-full px-3 py-2.5 bg-white border border-slate-300 rounded-lg text-sm text-slate-700 flex justify-between items-center focus:outline-none focus:ring-2 focus:ring-[#004994] transition-shadow">
                            <span id="deptSelectLabel" class="truncate font-medium text-slate-400">請選擇部門...</span>
                            <div class="absolute right-2 flex items-center gap-1.5">
                                <div id="deptClearX" class="hide p-0.5 hover:bg-slate-200 rounded-full transition-colors text-slate-400 hover:text-slate-600" title="清除全部">
                                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                                </div>
                                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 shrink-0"></i>
                            </div>
                        </button>
                        
                        <div id="deptSelectDropdown" class="hide absolute left-0 top-full mt-1 w-full bg-white border border-slate-200 rounded-lg shadow-xl z-50 flex flex-col fade-in">
                            <div class="p-2 border-b border-slate-100">
                                <div class="relative">
                                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" id="deptSelectSearch" placeholder="搜尋部門..." class="w-full pl-9 pr-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-[#004994] focus:border-transparent transition-shadow">
                                </div>
                            </div>
                            <div class="overflow-y-auto max-h-48 p-1 relative" id="deptSelectList">
                                <!-- Rendered via JS -->
                            </div>
                            <div class="p-2 border-t border-slate-100 bg-slate-50/50">
                                <button id="deptClearAll" class="w-full py-2 text-xs font-bold text-slate-500 hover:text-red-600 hover:bg-red-50 rounded transition-colors flex items-center justify-center gap-1.5">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                    清除全部
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 bg-white border-t border-slate-100 flex items-center justify-between shrink-0">
                <button class="text-sm font-bold text-slate-500 hover:text-slate-700 transition-colors">清除條件</button>
                <div class="flex gap-3">
                    <button onclick="closeFilterModal()" class="px-5 py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">取消</button>
                    <button onclick="closeFilterModal()" class="px-6 py-2.5 border border-transparent rounded-lg text-sm font-bold bg-[#004994] text-white hover:bg-blue-800 shadow-md hover:shadow-lg transition-all">套用篩選</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal Overlay -->
    <div id="detailModalOverlay"
        class="hide fixed inset-0 z-40 bg-slate-900/60 flex items-center justify-center p-4 sm:p-6 backdrop-blur-sm fade-in">
        <div
            class="bg-white w-full max-w-6xl max-h-[90vh] rounded-xl shadow-2xl flex flex-col overflow-hidden slide-up relative">

            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-slate-50/50">
                <div class="flex items-center space-x-3">
                    <h2 class="text-xl font-bold text-slate-800">簽核詳情</h2>
                    <span id="modalTaskID"
                        class="px-2 py-0.5 rounded text-xs font-semibold bg-slate-200 text-slate-700 tracking-wide font-mono">
                        TSK-XXXX-XXX
                    </span>
                </div>
                <button onclick="closeDetailModal()"
                    class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="flex-1 overflow-auto flex flex-col md:flex-row relative">
                <!-- Main Content Area (Left) -->
                <div class="flex-1 p-6 border-b md:border-b-0 md:border-r border-slate-200">
                    <div class="mb-6 space-y-4">
                        <h3 id="modalTaskTitle" class="text-2xl font-bold text-slate-900">Task Title</h3>
                        <div class="flex flex-wrap items-center gap-4 text-sm text-slate-600">
                            <div class="flex items-center gap-1.5"><span class="text-slate-500">提交者:</span><span
                                    id="modalTaskSubmitter" class="font-medium text-slate-900">Name</span></div>
                            <div class="flex items-center gap-1.5"><span class="text-slate-500">公司:</span><span
                                    id="modalTaskCompany" class="font-medium text-slate-900">Company</span></div>
                            <div class="flex items-center gap-1.5"><span class="text-slate-500">時間:</span><span
                                    id="modalTaskDate" class="font-medium text-slate-900">Date</span></div>
                            <div class="flex items-center gap-1.5"><span id="modalTaskSystem"
                                    class="px-2 py-1 rounded bg-slate-200 text-slate-700 font-bold text-xs">SYS</span>
                            </div>
                        </div>
                    </div>

                    <!-- HTML Render Area -->
                    <div class="mt-4">
                        <div class="flex items-center space-x-2 mb-3">
                            <i data-lucide="file-text" class="w-5 h-5 text-slate-500"></i>
                            <h4 class="text-base font-semibold text-slate-800">表單內容</h4>
                        </div>
                        <div
                            class="w-full min-h-[400px] border-2 border-dashed border-slate-300 bg-slate-50/50 rounded-lg p-6 flex items-center justify-center relative group">
                            <div
                                class="absolute inset-4 bg-white border border-slate-200 shadow-sm rounded p-4 opacity-50 group-hover:opacity-100 transition-opacity flex flex-col space-y-4 z-0">
                                <div class="h-4 bg-slate-200 rounded w-1/3"></div>
                                <div class="h-4 bg-slate-100 rounded w-full"></div>
                                <div class="h-4 bg-slate-100 rounded w-5/6"></div>
                                <div class="h-4 bg-slate-100 rounded w-4/6"></div>
                                <div class="mt-6 flex gap-4">
                                    <div class="flex-1 h-32 bg-slate-50/50 border border-slate-100 rounded"></div>
                                    <div class="flex-1 h-32 bg-slate-100/50 border border-slate-200 rounded"></div>
                                </div>
                            </div>
                            <span class="text-slate-400 font-medium tracking-widest z-10">表單內容預覽區域</span>
                        </div>
                    </div>
                </div>

                <!-- Timeline Area (Right) -->
                <div class="w-full md:w-80 lg:w-96 bg-slate-50 p-6 flex flex-col shrink-0">
                    <h4 class="text-base font-semibold text-slate-800 mb-6">簽核歷程</h4>
                    <div class="relative flex-1" id="timelineContainer">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Sticky Footer -->
            <div
                class="px-6 py-4 bg-white border-t border-slate-200 flex flex-wrap items-center justify-end gap-3 shrink-0">
                <button onclick="openActionDialog('reject')"
                    class="flex items-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                    <i data-lucide="x-circle" class="w-4 h-4 text-slate-400"></i><span>拒絕</span>
                </button>
                <button onclick="openActionDialog('contact')"
                    class="flex items-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                    <i data-lucide="phone-call" class="w-4 h-4 text-slate-400"></i><span>聯繫負責人</span>
                </button>
                <button onclick="openActionDialog('forward')"
                    class="flex items-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                    <i data-lucide="corner-up-right" class="w-4 h-4 text-slate-400"></i><span>轉發</span>
                </button>
                <button onclick="openActionDialog('approve-forward')"
                    class="flex items-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-800 hover:bg-slate-50 transition-colors">
                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-500"></i><span>通過並轉發</span>
                </button>
                <button onclick="openActionDialog('approve')"
                    class="flex items-center space-x-1.5 px-6 py-2 bg-slate-800 border border-transparent rounded-md text-sm font-medium text-white hover:bg-slate-900 shadow-sm transition-colors">
                    <i data-lucide="check" class="w-4 h-4 text-white"></i><span>通過</span>
                </button>
            </div>

            <!-- Action Dialog (Nested overlapping detail modal for visual effect) -->
            <div id="actionDialog"
                class="hide absolute inset-0 z-[60] bg-slate-900/60 flex items-center justify-center p-4 backdrop-blur-sm fade-in">
                <div
                    class="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col overflow-hidden slide-up border border-slate-200">
                    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-white">
                        <h3 class="text-lg font-bold text-slate-900 flex items-center gap-3">
                            <div class="p-2 rounded-full bg-slate-100 text-slate-600">
                                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                            </div>
                            <span id="dialogTitle">確認動作</span>
                        </h3>
                        <button onclick="closeActionDialog()"
                            class="p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors focus:outline-none">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="p-6 space-y-6 bg-slate-50/50">
                        <div
                            class="p-4 rounded-xl border flex gap-3 shadow-sm bg-slate-50 border-slate-200 text-slate-800">
                            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5 text-slate-500"></i>
                            <div>
                                <p class="font-bold text-sm mb-1">即將執行的動作</p>
                                <p id="dialogDesc" class="text-sm font-medium opacity-90">請確認是否執行此動作？</p>
                            </div>
                        </div>

                        <div id="adSearchGroup" class="hide space-y-2">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-1">搜尋轉發帳號 <span
                                    class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="search"
                                    class="w-5 h-5 absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                <input id="dialogAccount" type="text" placeholder="請輸入 AD 帳號或姓名搜尋..."
                                    class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow shadow-sm">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700 flex justify-between items-center">
                                <span>備註說明 <span id="dialogRemarkRequired" class="hide text-red-500">*</span></span>
                                <span id="remarkCount" class="text-xs font-mono text-slate-400">0/200</span>
                            </label>
                            <textarea id="dialogRemark" placeholder="請輸入簽核意見或備註 (若拒絕則為必填)..." rows="4" maxlength="200"
                                class="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow shadow-sm resize-none leading-relaxed"></textarea>
                        </div>
                    </div>

                    <div
                        class="px-6 py-4 bg-white border-t border-slate-100 flex flex-col sm:flex-row items-center justify-end gap-3 shrink-0">
                        <button onclick="closeActionDialog()"
                            class="w-full sm:w-auto px-5 py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors focus:ring-2 focus:ring-slate-200">
                            取消
                        </button>
                        <button onclick="confirmAction(false)"
                            class="w-full sm:w-auto px-5 py-2.5 border rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2 bg-white text-slate-700 border-slate-300 hover:bg-slate-50">
                            <i data-lucide="check" class="w-4 h-4"></i> 確認送出
                        </button>
                        <button onclick="confirmAction(true)"
                            class="w-full sm:w-auto px-6 py-2.5 border border-transparent rounded-lg text-sm font-bold shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 group bg-slate-800 text-white hover:bg-slate-900">
                            <i data-lucide="fast-forward"
                                class="w-4 h-4 group-hover:translate-x-0.5 transition-transform text-white"></i>
                            確認送出並續簽下一筆
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification purely for Visuals -->
    <div id="toast"
        class="hide fixed top-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 z-[100] transition-opacity duration-300">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
        <span id="toastMsg" class="text-sm font-medium">操作成功</span>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        // Data
        const TASK_DATA = [
            { id: 'TSK-2023-001', title: 'PCBA Material Price Negotiation Request', system: 'ERP', company: 'MIC HQ', submitter: 'Alice Chen', submitDate: '2023-10-25 10:30', status: 'pending', delegate: { isDelegated: false } },
            { id: 'TSK-2023-002', title: 'New Product Component Design Review', system: 'PLM', company: 'MiTAC Computing', submitter: 'Bob Wang', submitDate: '2023-10-24 14:15', status: 'contacting', delegate: { isDelegated: true, originalOwner: 'Charlie Lin' } },
            { id: 'TSK-2023-003', title: 'Q4 Annual Leave Application', system: 'OA', company: 'MiTAC Digital', submitter: 'David Liu', submitDate: '2023-10-23 09:00', status: 'pending', delegate: { isDelegated: false } },
            { id: 'TSK-2023-006', title: 'Equipment Maintenance Contract Renewal', system: 'ERP', company: 'MiTAC HQ', submitter: 'Grace Wu', submitDate: '2023-10-20 15:30', status: 'pending', delegate: { isDelegated: true, originalOwner: 'Henry Yang' } }
        ];

        const HISTORY_DATA = [
            { id: 'TSK-2023-004', title: 'Supplier Quality Assessment Report', system: 'ESCM', company: 'MiTAC HQ', submitter: 'Eva Huang', submitDate: '2023-10-22 16:45', status: 'completed', delegate: { isDelegated: false } },
            { id: 'TSK-2023-005', title: 'Server Rack Specifications Update', system: 'PLM', company: 'MiTAC Computing', submitter: 'Frank Chang', submitDate: '2023-10-21 11:20', status: 'rejected', delegate: { isDelegated: false } }
        ];

        let activeTab = 'pending';
        let currentTaskIndex = -1;

        // UI Helpers
        const getStatusColor = (status) => {
            if (status === 'pending') return 'bg-slate-100 text-slate-800 border-slate-200';
            if (status === 'contacting') return 'bg-slate-200 text-slate-800 border-slate-300';
            if (status === 'completed') return 'bg-slate-100 text-slate-800 border-slate-200';
            if (status === 'rejected') return 'bg-slate-50 text-slate-800 border-slate-200';
            return 'bg-slate-100 text-slate-800 border-slate-200';
        };

        const getStatusLabel = (status) => {
            if (status === 'pending') return '待簽核';
            if (status === 'contacting') return '聯繫中';
            if (status === 'completed') return '已完成';
            if (status === 'rejected') return '已拒絕';
            return '未知';
        };

        const getSystemColor = (system) => {
            if (system === 'ERP') return 'bg-slate-200 text-slate-700';
            if (system === 'PLM') return 'bg-slate-300 text-slate-800';
            if (system === 'OA') return 'bg-slate-100 text-slate-600';
            if (system === 'ESCM') return 'bg-slate-400 text-slate-900';
            return 'bg-slate-100 text-slate-700';
        };

        const getTimelineHTML = (delegate) => {
            return `
                <div class="relative flex gap-4 pb-8 group">
                    <div class="absolute top-8 left-[11px] bottom-0 w-0.5 bg-slate-200 group-hover:bg-slate-300 transition-colors"></div>
                    <div class="relative mt-1 shrink-0">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center bg-white z-10 bg-slate-600 border-slate-600">
                            <i data-lucide="check" class="w-3.5 h-3.5 text-slate-100"></i>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between"><span class="font-semibold text-slate-900 text-sm">Alice Chen</span><span class="text-xs text-slate-500">2023-10-25 10:30</span></div>
                        <div class="mt-0.5 text-sm font-medium text-slate-600">第 1 步 · <span class="ml-1 text-slate-800">已核准</span></div>
                        <div class="mt-2 p-3 bg-white border border-slate-200 rounded-md text-sm text-slate-600 shadow-sm">"Submitted form"</div>
                    </div>
                </div>
                <div class="relative flex gap-4 group">
                    <div class="relative mt-1 shrink-0">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center bg-white z-10 bg-slate-400 border-slate-400">
                            <div class="w-2 h-2 rounded-full bg-slate-300"></div>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between"><span class="font-semibold text-slate-900 text-sm">您本人 (${delegate ? '代理' : '親簽'})</span></div>
                        <div class="mt-0.5 text-sm font-medium text-slate-600">第 2 步 · <span class="ml-1 text-slate-500">待簽核</span></div>
                    </div>
                </div>
            `;
        }

        const renderList = () => {
            const list = document.getElementById('taskList');
            const data = activeTab === 'pending' ? TASK_DATA : HISTORY_DATA;

            // Update Page Title
            document.getElementById('pageTitle').innerText = activeTab === 'pending' ? '待簽核' : '歷史單據';

            list.innerHTML = data.map((task, index) => `
                <div onclick="openDetailModal(${index})" class="bg-white rounded-lg border border-slate-200 p-4 hover:border-blue-300 hover:shadow-sm transition-all cursor-pointer group flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-start md:items-center gap-4 flex-1">
                        <div class="mt-1 md:mt-0 whitespace-nowrap px-2.5 py-1 text-xs font-semibold rounded-md border ${getStatusColor(task.status)}">${getStatusLabel(task.status)}</div>
                        <div>
                            <h3 class="text-base font-medium text-slate-900 group-hover:text-slate-700 transition-colors">${task.title}</h3>
                            <div class="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500">
                                <span class="font-mono">${task.id}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-300"></span><span>${task.submitDate}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                                <div class="flex items-center gap-1.5"><span class="px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wider ${getSystemColor(task.system)}">${task.system}</span><span>${task.company}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between md:justify-end gap-6 border-t md:border-t-0 border-slate-100 pt-3 md:pt-0">
                        <div class="flex items-center gap-2 text-sm">
                            <div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs text-slate-600">${task.submitter.charAt(0)}</div>
                            <span class="text-slate-700 font-medium">${task.submitter}</span>
                        </div>
                        ${task.delegate.isDelegated ? `
                            <div class="flex flex-col items-end">
                                <span class="text-xs font-semibold text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">代理簽核</span>
                                <span class="text-xs text-slate-400 mt-0.5">原負責人: ${task.delegate.originalOwner}</span>
                            </div>
                        ` : `<div class="w-24"></div>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget;
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                target.classList.add('active');
                activeTab = target.getAttribute('data-tab');
                renderList();
            });
        });

        // Modals Logic
        window.openDetailModal = (index) => {
            currentTaskIndex = index;
            const task = (activeTab === 'pending' ? TASK_DATA : HISTORY_DATA)[index];

            document.getElementById('modalTaskID').innerText = task.id;
            document.getElementById('modalTaskTitle').innerText = task.title;
            document.getElementById('modalTaskSubmitter').innerText = task.submitter;
            document.getElementById('modalTaskCompany').innerText = task.company;
            document.getElementById('modalTaskDate').innerText = task.submitDate;
            document.getElementById('modalTaskSystem').innerText = task.system;
            document.getElementById('timelineContainer').innerHTML = getTimelineHTML(task.delegate.isDelegated);

            document.getElementById('detailModalOverlay').classList.remove('hide');
            lucide.createIcons();
        };

        window.closeDetailModal = () => {
            document.getElementById('detailModalOverlay').classList.add('hide');
            document.getElementById('actionDialog').classList.add('hide');
        };

        window.openActionDialog = (type) => {
            const isForward = type === 'forward' || type === 'approve-forward';
            const isReject = type === 'reject';

            let title = '確認動作', desc = '請確認是否執行此動作？';
            if (type === 'approve') { title = '確認通過'; desc = '確認通過此簽核？'; }
            if (type === 'approve-forward') { title = '通過並轉發'; desc = '確認通過此簽核並轉發給其他人員？'; }
            if (type === 'forward') { title = '確認轉發'; desc = '確認將此簽核轉發給其他人員？'; }
            if (type === 'contact') { title = '聯繫負責人'; desc = '即將記錄聯繫狀態，請填寫備註。'; }
            if (type === 'reject') { title = '確認拒絕'; desc = '確定要拒絕此簽核？此動作將退回單據且無法復原。'; }

            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogDesc').innerText = desc;

            document.getElementById('adSearchGroup').classList.toggle('hide', !isForward);
            document.getElementById('dialogRemarkRequired').classList.toggle('hide', !isReject);

            document.getElementById('dialogRemark').value = '';
            document.getElementById('dialogAccount').value = '';
            document.getElementById('remarkCount').innerText = '0/200';

            document.getElementById('actionDialog').classList.remove('hide');
        };

        window.closeActionDialog = () => {
            document.getElementById('actionDialog').classList.add('hide');
        };

        // Textarea count
        document.getElementById('dialogRemark').addEventListener('input', (e) => {
            document.getElementById('remarkCount').innerText = `${e.target.value.length}/200`;
        });

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('hide');
            setTimeout(() => t.classList.add('hide'), 3000);
        };

        window.confirmAction = (andNext) => {
            showToast(andNext ? '動作已送出，正在載入下一筆...' : '動作已確認送出');
            closeActionDialog();

            if (andNext && activeTab === 'pending' && currentTaskIndex < TASK_DATA.length - 1) {
                // Open next directly
                openDetailModal(currentTaskIndex + 1);
            } else {
                closeDetailModal();
            }
        };

        // Company Autocomplete Multiple Select
        const COMPANY_OPTIONS = ['GLOBAL', 'MCT', 'MDT', 'MIC', 'MISK', 'MSL', 'MVL'];
        let selectedCompanies = new Set();
        
        const companySelectTrigger = document.getElementById('companySelectTrigger');
        const companySelectDropdown = document.getElementById('companySelectDropdown');
        const companySelectSearch = document.getElementById('companySelectSearch');
        const companySelectList = document.getElementById('companySelectList');
        const companySelectLabel = document.getElementById('companySelectLabel');
        const companyClearAll = document.getElementById('companyClearAll');
        const companyClearX = document.getElementById('companyClearX');

        const clearAllCompanies = () => {
            selectedCompanies.clear();
            updateCompanySelectLabel();
            renderCompanyList(companySelectSearch.value);
        };

        const updateCompanySelectLabel = () => {
            if (selectedCompanies.size === 0 || selectedCompanies.size === COMPANY_OPTIONS.length) {
                companySelectLabel.innerText = '所有公司';
                companySelectLabel.classList.remove('text-[#004994]', 'font-bold');
                companySelectTrigger.classList.remove('border-[#004994]', 'bg-blue-50/50');
                companyClearX.classList.add('hide');
            } else {
                companySelectLabel.innerText = `已選擇 ${selectedCompanies.size}`;
                companySelectLabel.classList.add('text-[#004994]', 'font-bold');
                companySelectTrigger.classList.add('border-[#004994]', 'bg-blue-50/50');
                companyClearX.classList.remove('hide');
            }
        };

        const renderCompanyList = (filterText = '') => {
            const filteredOptions = COMPANY_OPTIONS.filter(c => c.toLowerCase().includes(filterText.toLowerCase()));
            
            if (filteredOptions.length === 0) {
                 companySelectList.innerHTML = `<div class="px-3 py-4 text-sm text-slate-500 text-center font-medium">無符合結果</div>`;
                 return;
            }

            companySelectList.innerHTML = filteredOptions.map(company => {
                const isSelected = selectedCompanies.has(company);
                return `
                    <div class="company-option flex items-center justify-between px-3 py-2.5 cursor-pointer hover:bg-slate-50 rounded-md transition-colors" data-value="${company}">
                        <span class="text-sm font-medium ${isSelected ? 'text-[#004994]' : 'text-slate-700'}">${company}</span>
                        ${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-[#004994] shrink-0"></i>' : '<div class="w-4 h-4 shrink-0"></div>'}
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.company-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const val = opt.getAttribute('data-value');
                    if (selectedCompanies.has(val)) {
                        selectedCompanies.delete(val);
                    } else {
                        selectedCompanies.add(val);
                    }
                    updateCompanySelectLabel();
                    renderCompanyList(companySelectSearch.value);
                });
            });
            lucide.createIcons();
        };

        companySelectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = companySelectDropdown.classList.contains('hide');
            document.getElementById('langDropdown').classList.add('hide');

            if (isHidden) {
                companySelectDropdown.classList.remove('hide');
                companySelectSearch.value = '';
                renderCompanyList();
                setTimeout(() => companySelectSearch.focus(), 50);
            } else {
                companySelectDropdown.classList.add('hide');
            }
        });

        companySelectSearch.addEventListener('input', (e) => {
            renderCompanyList(e.target.value);
        });
        
        companySelectSearch.addEventListener('click', (e) => {
            e.stopPropagation();
        });
        
        companySelectList.addEventListener('click', (e) => {
             e.stopPropagation();
        });

        companyClearAll.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAllCompanies();
        });

        companyClearX.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAllCompanies();
        });

        // Filter Modal Logic
        window.openFilterModal = () => {
            document.getElementById('filterModalOverlay').classList.remove('hide');
        };

        window.closeFilterModal = () => {
            document.getElementById('filterModalOverlay').classList.add('hide');
            const deptDropdown = document.getElementById('deptSelectDropdown');
            if (deptDropdown) deptDropdown.classList.add('hide');
        };

        // Dept Autocomplete Multiple Select
        const DEPT_OPTIONS = ['HR', 'IT', 'Finance', 'RD', 'Sales', 'Marketing', 'Legal', 'Operations'];
        let selectedDepts = new Set();
        
        const deptSelectTrigger = document.getElementById('deptSelectTrigger');
        const deptSelectDropdown = document.getElementById('deptSelectDropdown');
        const deptSelectSearch = document.getElementById('deptSelectSearch');
        const deptSelectList = document.getElementById('deptSelectList');
        const deptSelectLabel = document.getElementById('deptSelectLabel');
        const deptClearAll = document.getElementById('deptClearAll');
        const deptClearX = document.getElementById('deptClearX');

        const clearAllDepts = () => {
            selectedDepts.clear();
            updateDeptSelectLabel();
            renderDeptList(deptSelectSearch.value);
        };

        const updateDeptSelectLabel = () => {
            if (selectedDepts.size === 0) {
                deptSelectLabel.innerText = '請選擇部門...';
                deptSelectLabel.classList.remove('text-[#004994]', 'font-bold');
                deptSelectLabel.classList.add('text-slate-400');
                deptSelectTrigger.classList.remove('border-[#004994]', 'bg-blue-50/50');
                deptClearX.classList.add('hide');
            } else {
                deptSelectLabel.innerText = `已選擇 ${selectedDepts.size}`;
                deptSelectLabel.classList.remove('text-slate-400');
                deptSelectLabel.classList.add('text-[#004994]', 'font-bold');
                deptSelectTrigger.classList.add('border-[#004994]', 'bg-blue-50/50');
                deptClearX.classList.remove('hide');
            }
        };

        const renderDeptList = (filterText = '') => {
            const filteredOptions = DEPT_OPTIONS.filter(c => c.toLowerCase().includes(filterText.toLowerCase()));
            
            if (filteredOptions.length === 0) {
                 deptSelectList.innerHTML = `<div class="px-3 py-4 text-sm text-slate-500 text-center font-medium">無符合結果</div>`;
                 return;
            }

            deptSelectList.innerHTML = filteredOptions.map(dept => {
                const isSelected = selectedDepts.has(dept);
                return `
                    <div class="dept-option flex items-center justify-between px-3 py-2.5 cursor-pointer hover:bg-slate-50 rounded-md transition-colors" data-value="${dept}">
                        <span class="text-sm font-medium ${isSelected ? 'text-[#004994]' : 'text-slate-700'}">${dept}</span>
                        ${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-[#004994] shrink-0"></i>' : '<div class="w-4 h-4 shrink-0"></div>'}
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.dept-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const val = opt.getAttribute('data-value');
                    if (selectedDepts.has(val)) {
                        selectedDepts.delete(val);
                    } else {
                        selectedDepts.add(val);
                    }
                    updateDeptSelectLabel();
                    renderDeptList(deptSelectSearch.value);
                });
            });
            lucide.createIcons();
        };

        deptSelectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = deptSelectDropdown.classList.contains('hide');

            if (isHidden) {
                deptSelectDropdown.classList.remove('hide');
                deptSelectSearch.value = '';
                renderDeptList();
                setTimeout(() => deptSelectSearch.focus(), 50);
            } else {
                deptSelectDropdown.classList.add('hide');
            }
        });

        deptSelectSearch.addEventListener('input', (e) => {
            renderDeptList(e.target.value);
        });
        
        deptSelectSearch.addEventListener('click', (e) => {
            e.stopPropagation();
        });
        
        deptSelectList.addEventListener('click', (e) => {
             e.stopPropagation();
        });
        
        deptClearAll.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAllDepts();
        });

        deptClearX.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAllDepts();
        });

        // Language Dropdown
        document.getElementById('langToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('langDropdown').classList.toggle('hide');
            companySelectDropdown.classList.add('hide');
        });

        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.getElementById('currentLang').innerText = e.target.getAttribute('data-lang');
                document.getElementById('langDropdown').classList.add('hide');
            });
        });

        document.body.addEventListener('click', () => {
            document.getElementById('langDropdown').classList.add('hide');
            companySelectDropdown.classList.add('hide');
            const deptDropdown = document.getElementById('deptSelectDropdown');
            if (deptDropdown) deptDropdown.classList.add('hide');
        });

        // Overlay click to close
        document.getElementById('detailModalOverlay').addEventListener('mousedown', function (e) {
            if (e.target === this) closeDetailModal();
        });

        document.getElementById('filterModalOverlay').addEventListener('mousedown', function (e) {
            if (e.target === this) closeFilterModal();
        });

        // Initialize display
        renderList();
    </script>
</body>
